# Base KrishiFarms CRM stack — extended by environment override files.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-krishi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-krishifarms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-krishi} -d ${POSTGRES_DB:-krishifarms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krishifarms

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krishifarms

  api:
    image: ${API_IMAGE:-ghcr.io/gvsharma/krishifarms-crm:latest}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-../config/.env}
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-krishi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-krishifarms}
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - krishifarms
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_BIND:-127.0.0.1:8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - krishifarms
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  krishifarms:
    name: krishifarms-net

volumes:
  pgdata:
  redisdata:
