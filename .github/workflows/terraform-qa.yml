name: Terraform (qa)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Run terraform apply
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: ap-south-1
  WORKING_DIR: environments/qa
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN || 'arn:aws:iam::085863558134:role/KrishiFarmsGitHubTerraformRole' }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: qa
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - run: terraform init -input=false

      - run: terraform plan -no-color -var-file=ci.tfvars -out=tfplan

      - if: inputs.apply == true
        run: terraform apply -no-color -auto-approve tfplan
