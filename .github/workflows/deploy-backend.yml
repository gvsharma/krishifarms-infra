name: Deploy Backend

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "environments/**"
      - "modules/**"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, qa, prod]
        default: dev
      image_tag:
        description: Docker image tag to deploy
        type: string
        default: latest

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  REGISTRY: ghcr.io
  IMAGE_NAME: gvsharma/krishifarms-crm

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install pytest httpx sqlalchemy psycopg2-binary pydantic-settings
        continue-on-error: true

      - name: Run tests
        run: pytest -q || echo "Wire pytest when app repo is connected"
        continue-on-error: true

  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag || github.sha }}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        continue-on-error: true

  deploy:
    name: Deploy via SSM
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_DEPLOY_ROLE_ARN || vars.AWS_BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload compose bundle
        run: |
          tar czf release.tar.gz docker/ scripts/deploy/
          aws s3 cp release.tar.gz "s3://${DEPLOY_BUCKET}/releases/${{ needs.build.outputs.image_tag }}/release.tar.gz"

      - name: SSM deploy
        run: |
          aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "KrishiFarms deploy ${{ needs.build.outputs.image_tag }}" \
            --parameters commands=[
              "aws s3 cp s3://${DEPLOY_BUCKET}/releases/${{ needs.build.outputs.image_tag }}/release.tar.gz /tmp/release.tar.gz",
              "tar xzf /tmp/release.tar.gz -C /tmp",
              "ENVIRONMENT=${DEPLOY_ENV} BACKUP_BUCKET=${{ vars.BACKUP_BUCKET }} /opt/krishifarms/scripts/deploy.sh ${{ needs.build.outputs.image_tag }}"
            ] \
            --output text
